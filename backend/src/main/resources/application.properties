spring.application.name=retail-store-api
server.port=${PORT:8080}

# MySQL DataSource (Aiven Cloud)
spring.datasource.url=jdbc:mysql://retail-db-rajaadhikary05032005-0e89.c.aivencloud.com:26009/defaultdb?useSSL=true&requireSSL=true&verifyServerCertificate=false
spring.datasource.username=${DB_USERNAME:avnadmin}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# CORS (allow frontend)
app.cors.allowed-origins=http://localhost:5173,http://localhost:4173,https://store-raja.vercel.app,https://retail-store-gilt.vercel.app

# Mail Settings (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Token Auth
app.auth.token-secret=${APP_AUTH_TOKEN_SECRET:change-me-in-production}
app.auth.token-ttl-minutes=${APP_AUTH_TOKEN_TTL_MINUTES:720}
app.auth.password-min-length=${APP_AUTH_PASSWORD_MIN_LENGTH:8}
app.auth.password-reset.otp-ttl-minutes=${APP_AUTH_RESET_OTP_TTL_MINUTES:10}
app.auth.password-reset.max-verify-attempts=${APP_AUTH_RESET_MAX_VERIFY_ATTEMPTS:5}
app.auth.password-reset.request-window-minutes=${APP_AUTH_RESET_REQUEST_WINDOW_MINUTES:15}
app.auth.password-reset.max-requests-per-window=${APP_AUTH_RESET_MAX_REQUESTS_PER_WINDOW:3}
app.auth.password-reset.min-seconds-between-requests=${APP_AUTH_RESET_MIN_SECONDS_BETWEEN_REQUESTS:30}

# Bootstrap account
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@retailstore.com}
app.bootstrap.admin.name=${BOOTSTRAP_ADMIN_NAME:Retail Admin}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:ChangeMe123!}

